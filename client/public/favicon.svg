<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base frame -->
  <path d="M 25 80 L 75 80" stroke="#b0b5be" stroke-width="6" stroke-linecap="round" />
  
  <!-- Back frame & handle -->
  <path d="M 70 80 L 80 30 C 82 20 85 20 90 20" stroke="#b0b5be" stroke-width="6" stroke-linecap="round" fill="none" />
  
  <!-- Handle blue tip -->
  <circle cx="90" cy="20" r="5" fill="#3b82f6" />
  
  <!-- Wheels (blue) -->
  <circle cx="35" cy="90" r="6" fill="#3b82f6" />
  <circle cx="65" cy="90" r="6" fill="#3b82f6" />

  <!-- Basket outer shape -->
  <path d="M 20 30 L 75 30 L 70 70 L 25 70 Z" stroke="#b0b5be" stroke-width="6" stroke-linejoin="round" fill="none" />
  
  <!-- Basket horizontal lines -->
  <path d="M 22.5 43.3 L 73.5 43.3" stroke="#b0b5be" stroke-width="4" stroke-linecap="round" />
  <path d="M 24 56.6 L 71.5 56.6" stroke="#b0b5be" stroke-width="4" stroke-linecap="round" />

  <!-- Basket vertical lines -->
  <path d="M 37 30 L 38 70" stroke="#b0b5be" stroke-width="4" stroke-linecap="round" />
  <path d="M 51 30 L 51 70" stroke="#b0b5be" stroke-width="4" stroke-linecap="round" />
  <path d="M 63 30 L 61 70" stroke="#b0b5be" stroke-width="4" stroke-linecap="round" />
</svg>
